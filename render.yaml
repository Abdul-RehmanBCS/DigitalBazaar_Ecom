# Render Blueprint — connect repo after push: https://dashboard.render.com/blueprints
# Dashboard → New → Blueprint → select DigitalBazaar_Ecom repo

services:
  - type: web
    name: digitalbazaar-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        fromService:
          type: web
          name: digitalbazaar-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: digitalbazaar-web
    runtime: static
    rootDir: client
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_ROOT
        fromService:
          type: web
          name: digitalbazaar-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SITE_URL
        fromService:
          type: web
          name: digitalbazaar-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_STRIPE_PUBLIC_KEY
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
