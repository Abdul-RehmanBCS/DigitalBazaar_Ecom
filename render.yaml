services:
  - type: web
    name: digitalbazaar-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://digitalbazaar-web.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: digitalbazaar-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_ROOT
        value: https://digitalbazaar-api.onrender.com
      - key: VITE_SITE_URL
        value: https://digitalbazaar-web.onrender.com
      - key: VITE_STRIPE_PUBLIC_KEY
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
